<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:#050914;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.container{
    width:100%;
    max-width:900px;
    padding:20px;
}

.top-bar{
    display:flex;
    justify-content:flex-end;
    margin-bottom:30px;
}

.logo-btn{
    background:#7c6ee6;
    color:#fff;
    border:none;
    padding:12px 28px;
    border-radius:10px;
    font-size:15px;
    cursor:pointer;
}

.card{
    background:#0d1220;
    border:1px solid #202942;
    border-radius:16px;
    padding:30px;
}

h1{
    margin-bottom:10px;
    font-size:38px;
}

.subtitle{
    color:#b9c0d4;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#cfd6ea;
}

input{
    width:100%;
    padding:15px;
    border-radius:10px;
    border:1px solid #29324d;
    background:#070b14;
    color:white;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#7c6ee6;
}

.login-btn{
    width:100%;
    border:none;
    background:#7c6ee6;
    color:white;
    padding:15px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    margin-top:10px;
}

.login-btn:hover{
    opacity:.9;
}

#error{
    color:#ff6b6b;
    margin-top:15px;
}
</style>
</head>
<body>

<div class="container">

    <div class="top-bar">
        <button class="logo-btn">Login</button>
    </div>

    <div class="card">

        <h1>Admin Login</h1>
        <p class="subtitle">
            Enter your username and password below.
        </p>

        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>

        <button class="login-btn" onclick="login()">
            Login
        </button>

        <p id="error"></p>

    </div>

</div>

<script>
function login(){

    const username =
    document.getElementById("username").value;

    const password =
    document.getElementById("password").value;

    if(username === "admin" &&
       password === "123456"){

        localStorage.setItem(
            "isLoggedIn",
            "true"
        );

        window.location.href="admin.html";

    }else{

        document.getElementById("error")
        .innerHTML="Invalid username or password.";

    }
}
</script>

</body>
</html>
