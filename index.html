<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
  :root{
    --bg:#0f1115; --card:#171a21; --border:#2a2e38;
    --accent:#7f77dd; --text:#eceef1; --muted:#9a9fab; --danger:#e24b4a;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); min-height:100vh;
    display:flex; align-items:center; justify-content:center; padding: 1rem;
  }
  .card{
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 1.5rem; width:100%; max-width: 360px;
  }
  h1{ font-size: 20px; font-weight:500; margin-bottom: 1.25rem; }
  label{ display:block; font-size:13px; color: var(--muted); margin-bottom: 6px; margin-top: 14px; }
  label:first-of-type{ margin-top:0; }
  input{
    width:100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 10px 12px; font-size: 14px; font-family: inherit;
  }
  input:focus{ outline: none; box-shadow: 0 0 0 2px var(--accent); }
  button{
    margin-top: 18px; width:100%; background: var(--accent); color: #fff; border:none;
    border-radius: 8px; padding: 11px; font-size: 14px; font-weight:500; cursor:pointer;
  }
  button:hover{ opacity:0.9; }
  button:active{ transform: scale(0.99); }
  button:disabled{ opacity:0.5; cursor:not-allowed; }
  .status{ font-size:13px; margin-top:10px; }
  .status.err{ color: var(--danger); }
</style>
</head>
<body>
<div class="card">
  <h1>Login</h1>

  <label for="username">Username</label>
  <input type="text" id="username" placeholder="Username" />

  <label for="password">Password</label>
  <input type="password" id="password" placeholder="Password" />

  <button id="loginBtn">Login</button>
  <p class="status" id="status"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = "https://nhhcczckfggxzcwvcyhi.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_L750rvxniNvogY-TS2VB0w_APqM391a";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const LOGIN_TABLE = "login";

const usernameInput = document.getElementById('admin_username');
const passwordInput = document.getElementById('admin_password');
const loginBtn = document.getElementById('loginBtn');
const statusEl = document.getElementById('status');

loginBtn.addEventListener('click', async () => {
  const u = usernameInput.value.trim();
  const p = passwordInput.value;

  if(!u || !p){
    statusEl.textContent = 'Please enter username and password.';
    statusEl.className = 'status err';
    return;
  }

  loginBtn.disabled = true;
  statusEl.textContent = 'Checking...';
  statusEl.className = 'status';

  const { data, error } = await sb
    .from(LOGIN_TABLE)
    .select('id')
    .eq('admin_username', u)
    .eq('admin_password', p)
    .limit(1);

  loginBtn.disabled = false;

  if(error){
    statusEl.textContent = 'Login error: ' + error.message;
    statusEl.className = 'status err';
    console.error(error);
    return;
  }

  if(data && data.length > 0){
    sessionStorage.setItem('isAdmin', 'true');
    window.location.href = 'admin.html';
  } else {
    statusEl.textContent = 'Invalid username or password.';
    statusEl.className = 'status err';
  }
});

passwordInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter') loginBtn.click();
});
</script>
</body>
</html>
