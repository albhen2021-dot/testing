<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Modal</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    background: #f2f2f2;
  }

  /* Top bar */
  .topbar {
    background: #333;
    color: white;
    padding: 15px;
    position: relative;
  }

  /* Login button top right */
  .login-btn {
    position: absolute;
    right: 20px;
    top: 10px;
    padding: 8px 15px;
    background: #4CAF50;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 5px;
  }

  /* Modal background */
  .modal {
    display: none;
    position: fixed;
    z-index: 1;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.6);
  }

  /* Modal box */
  .modal-content {
    background-color: white;
    margin: 10% auto;
    padding: 20px;
    width: 300px;
    border-radius: 10px;
    position: relative;
  }

  /* Close button */
  .close {
    position: absolute;
    right: 10px;
    top: 5px;
    font-size: 20px;
    cursor: pointer;
  }

  input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    box-sizing: border-box;
  }

  .submit-btn {
    width: 100%;
    padding: 10px;
    background: #333;
    color: white;
    border: none;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="topbar">
  My Website
  <button class="login-btn" onclick="openModal()">Login</button>
</div>

<!-- Modal -->
<div id="loginModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    
    <h3>Login</h3>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <button class="submit-btn">Submit</button>
  </div>
</div>

<script>
  function openModal() {
    document.getElementById("loginModal").style.display = "block";
  }

  function closeModal() {
    document.getElementById("loginModal").style.display = "none";
  }

  // close modal kapag nag-click sa labas
  window.onclick = function(event) {
    let modal = document.getElementById("loginModal");
    if (event.target == modal) {
      modal.style.display = "none";
    }
  }
</script>

</body>
</html>
