<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IGN Entries</title>
<style>
  :root{
    --bg:#0f1115; --card:#171a21; --border:#2a2e38;
    --accent:#7f77dd; --accent2:#1d9e75; --text:#eceef1;
    --muted:#9a9fab; --danger:#e24b4a;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); min-height:100vh; padding: 2rem 1rem;
  }
  .wrap{ max-width: 720px; margin: 0 auto; }
  h1{ font-size: 22px; font-weight:500; margin-bottom: 0.25rem; }
  h2{ font-size: 18px; font-weight:500; margin-bottom: 0.25rem; }
  .sub{ color: var(--muted); font-size: 14px; margin-bottom: 1.5rem; }
  .card{
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 1.25rem; margin-bottom: 1.5rem;
  }
  label{ display:block; font-size:13px; color: var(--muted); margin-bottom: 6px; margin-top: 14px; }
  label:first-of-type{ margin-top:0; }
  input{
    width:100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 10px 12px; font-size: 14px; font-family: inherit;
  }
  input:focus{ outline: none; box-shadow: 0 0 0 2px var(--accent); }
  button{
    margin-top: 18px; width:100%; background: var(--accent); color: #fff; border:none;
    border-radius: 8px; padding: 11px; font-size: 14px; font-weight:500; cursor:pointer;
  }
  button:hover{ opacity:0.9; }
  button:active{ transform: scale(0.99); }
  button:disabled{ opacity:0.5; cursor:not-allowed; }
  table{
    width:100%; border-collapse: collapse; background: var(--card);
    border: 1px solid var(--border); border-radius: 10px; overflow:hidden; font-size:14px;
  }
  th, td{ text-align:left; padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th{ color: var(--muted); font-weight:500; font-size:13px; background: #11141a; }
  tr:last-child td{ border-bottom:none; }
  td.tiktok{ color: var(--accent2); }
  td.num{ color: var(--muted); width: 1%; white-space: nowrap; }
  td.date{ color: var(--muted); font-size:13px; white-space: nowrap; }
  .table-wrap{ overflow-x:auto; }
  .empty{ color: var(--muted); font-size:14px; text-align:center; padding: 1rem 0; }
  .status{ font-size:13px; color: var(--muted); margin-top:8px; }

  .pagination{
    display:flex; justify-content:center; align-items:center; gap: 10px; margin-top: 1rem;
  }
  .pagination button{
    margin-top:0; width:auto; padding: 8px 14px; background: var(--card); border: 1px solid var(--border);
  }
  .pagination button:disabled{ opacity:0.4; }
  .pagination span{ font-size: 13px; color: var(--muted); }

  .topbar{
    display:flex; justify-content:flex-end; margin-bottom: 0.75rem;
  }
  .login-btn{
    margin-top:0; width:auto; padding: 8px 16px; font-size:13px;
  }

  .modal-overlay{
    display:none; position:fixed; inset:0; background: rgba(0,0,0,0.55);
    align-items:center; justify-content:center; z-index:100; padding: 1rem;
  }
  .modal-overlay.show{ display:flex; }
  .modal-wrap{ position:relative; width:100%; max-width: 360px; }
  .modal{
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 1.25rem; width:100%;
  }
  .modal h2{ margin-bottom: 1rem; }
  .modal-close{
    position:absolute; top:10px; right:14px; background:none; border:none;
    color: var(--muted); font-size:20px; cursor:pointer; margin:0; width:auto; padding:0;
  }
  .modal-msg{ font-size:14px; color: var(--text); margin-bottom: 0.5rem; }
  .status.err{ color: var(--danger); }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <button class="login-btn" id="loginBtn">Login</button>
  </div>

  <h1>IGN Submissions</h1>
  <p class="sub">Enter your IGN and TikTok account below.</p>

  <div class="card">
    <label for="ign">IGN (in-game name)</label>
    <input type="text" id="ign" placeholder="Your in-game name" />

    <label for="tiktok">TikTok account</label>
    <input type="text" id="tiktok" placeholder="@yourusername" />

    <button id="submitBtn">Save entry</button>
    <p class="status" id="status"></p>
  </div>

  <div id="list"><p class="empty">Loading...</p></div>
  <div class="pagination" id="pagination" style="display:none;">
    <button id="prevBtn">&laquo; Prev</button>
    <span id="pageInfo"></span>
    <button id="nextBtn">Next &raquo;</button>
  </div>
</div>

<!-- Duplicate entry modal -->
<div class="modal-overlay" id="dupOverlay">
  <div class="modal-wrap">
    <div class="modal">
      <button class="modal-close" id="dupCloseBtn" aria-label="Close">&times;</button>
      <h2>Duplicate Entry</h2>
      <p class="modal-msg">Details already exist.</p>
    </div>
  </div>
</div>

<!-- Login modal -->
<div class="modal-overlay" id="loginOverlay">
  <div class="modal-wrap">
    <div class="modal">
      <button class="modal-close" id="modalCloseBtn" aria-label="Close">&times;</button>
      <h2>Admin Login</h2>
      <label for="loginUsername">Username</label>
      <input type="text" id="loginUsername" placeholder="Username" />

      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" placeholder="Password" />

      <button id="loginSubmitBtn">Login</button>
      <p class="status" id="loginStatus"></p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = "https://nhhcczckfggxzcwvcyhi.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_L750rvxniNvogY-TS2VB0w_APqM391a";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const TABLE = "entries";
const LOGIN_TABLE = "login";
const PAGE_SIZE = 10;

const list = document.getElementById('list');
const statusEl = document.getElementById('status');
const pagination = document.getElementById('pagination');
const pageInfo = document.getElementById('pageInfo');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

const dupOverlay = document.getElementById('dupOverlay');
const dupCloseBtn = document.getElementById('dupCloseBtn');

const loginBtn = document.getElementById('loginBtn');
const loginOverlay = document.getElementById('loginOverlay');
const modalCloseBtn = document.getElementById('modalCloseBtn');
const loginUsername = document.getElementById('loginUsername');
const loginPassword = document.getElementById('loginPassword');
const loginSubmitBtn = document.getElementById('loginSubmitBtn');
const loginStatus = document.getElementById('loginStatus');

let allRows = [];
let currentPage = 1;

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function formatDate(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }) +
    ' ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
}

function renderEntries(){
  if(!allRows || allRows.length === 0){
    list.innerHTML = '<p class="empty">No entries yet.</p>';
    pagination.style.display = 'none';
    return;
  }

  const totalPages = Math.ceil(allRows.length / PAGE_SIZE);
  if(currentPage > totalPages) currentPage = totalPages;
  if(currentPage < 1) currentPage = 1;

  const startIdx = (currentPage - 1) * PAGE_SIZE;
  const pageRows = allRows.slice(startIdx, startIdx + PAGE_SIZE);

  let html = '';
  pageRows.forEach((row, i) => {
    const num = startIdx + i + 1;
    html += `
      <tr>
        <td class="num">${num}</td>
        <td>${escapeHtml(row.ign || '')}</td>
        <td class="tiktok">${escapeHtml(row.tiktok || '')}</td>
        <td class="date">${formatDate(row.created_at)}</td>
      </tr>`;
  });

  list.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Entry No.</th><th>IGN</th><th>TIKTOK</th><th>Date save</th></tr>
        </thead>
        <tbody>${html}</tbody>
      </table>
    </div>`;

  if(totalPages > 1){
    pagination.style.display = 'flex';
    pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
    prevBtn.disabled = currentPage <= 1;
    nextBtn.disabled = currentPage >= totalPages;
  } else {
    pagination.style.display = 'none';
  }
}

prevBtn.addEventListener('click', () => {
  currentPage--;
  renderEntries();
});
nextBtn.addEventListener('click', () => {
  currentPage++;
  renderEntries();
});

async function loadEntries(){
  const { data, error } = await sb
    .from(TABLE)
    .select('*')
    .order('created_at', { ascending: true });

  if(error){
    list.innerHTML = '<p class="empty">Could not load entries. Check your Supabase config.</p>';
    console.error(error);
    return;
  }
  allRows = data || [];
  renderEntries();
}

document.getElementById('submitBtn').addEventListener('click', async () => {
  const ign = document.getElementById('ign').value.trim();
  const tiktok = document.getElementById('tiktok').value.trim();

  if(!ign || !tiktok){
    statusEl.textContent = 'Please fill in IGN and TikTok account.';
    statusEl.className = 'status err';
    return;
  }

  // Check for duplicates (case-insensitive match on IGN + TikTok)
  const { data: existing, error: checkError } = await sb
    .from(TABLE)
    .select('id, ign, tiktok')
    .ilike('ign', ign)
    .ilike('tiktok', tiktok);

  if(checkError){
    statusEl.textContent = 'Error checking entry.';
    statusEl.className = 'status err';
    console.error(checkError);
    return;
  }

  if(existing && existing.length > 0){
    dupOverlay.classList.add('show');
    return;
  }

  const { error } = await sb.from(TABLE).insert({ ign, tiktok });

  if(error){
    statusEl.textContent = 'Error saving entry.';
    statusEl.className = 'status err';
    console.error(error);
    return;
  }

  statusEl.textContent = 'Saved.';
  statusEl.className = 'status';
  document.getElementById('ign').value = '';
  document.getElementById('tiktok').value = '';
  currentPage = Infinity;
  loadEntries();
});

dupCloseBtn.addEventListener('click', () => dupOverlay.classList.remove('show'));
dupOverlay.addEventListener('click', (e) => {
  if(e.target === dupOverlay) dupOverlay.classList.remove('show');
});

// ====================== Login modal ======================
function openLoginModal(){
  loginOverlay.classList.add('show');
  loginStatus.textContent = '';
  loginUsername.value = '';
  loginPassword.value = '';
  loginUsername.focus();
}
function closeLoginModal(){
  loginOverlay.classList.remove('show');
}

loginBtn.addEventListener('click', openLoginModal);
modalCloseBtn.addEventListener('click', closeLoginModal);
loginOverlay.addEventListener('click', (e) => {
  if(e.target === loginOverlay) closeLoginModal();
});

loginSubmitBtn.addEventListener('click', async () => {
  const u = loginUsername.value.trim();
  const p = loginPassword.value;

  if(!u || !p){
    loginStatus.textContent = 'Please enter username and password.';
    loginStatus.className = 'status err';
    return;
  }

  loginSubmitBtn.disabled = true;
  loginStatus.textContent = 'Checking...';
  loginStatus.className = 'status';

  const { data, error } = await sb
    .from(LOGIN_TABLE)
    .select('id')
    .eq('admin_username', u)
    .eq('admin_password', p)
    .limit(1);

  loginSubmitBtn.disabled = false;

  if(error){
    loginStatus.textContent = 'Login error. Try again.';
    loginStatus.className = 'status err';
    console.error(error);
    return;
  }

  if(data && data.length > 0){
    sessionStorage.setItem('entriesAdmin', 'true');
    window.location.href = 'admin.html';
  } else {
    loginStatus.textContent = 'Invalid username or password.';
    loginStatus.className = 'status err';
  }
});

loginPassword.addEventListener('keydown', (e) => {
  if(e.key === 'Enter') loginSubmitBtn.click();
});

loadEntries();

sb.channel('entries-changes')
  .on('postgres_changes', { event: '*', schema: 'public', table: TABLE }, () => loadEntries())
  .subscribe();
</script>
</body>
</html>
