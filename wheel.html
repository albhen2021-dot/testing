<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin the Wheel</title>
<style>
  :root{
    --bg:#0f1115; --card:#171a21; --border:#2a2e38;
    --accent:#7f77dd; --accent2:#1d9e75; --text:#eceef1; --muted:#9a9fab; --danger:#e24b4a;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); min-height:100vh; padding: 2rem 1rem;
  }
  .wrap{ max-width: 720px; margin: 0 auto; }
  h1{ font-size: 22px; font-weight:500; margin-bottom: 0.25rem; }
  .sub{ color: var(--muted); font-size: 14px; margin-bottom: 1.5rem; }
  .nav{ display:flex; gap:10px; margin-bottom: 1.5rem; }
  .nav a{
    color: var(--text); text-decoration:none; font-size:14px;
    padding:8px 14px; border:1px solid var(--border); border-radius:8px;
    background: var(--card);
  }
  .nav a.active{ background: var(--accent); border-color: var(--accent); }
  .card{
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 1.25rem; margin-bottom: 1.5rem;
  }
  h2{ font-size: 18px; font-weight:500; margin-bottom: 0.25rem; }
  button{
    margin-top: 18px; width:100%; background: var(--accent); color: #fff; border:none;
    border-radius: 8px; padding: 11px; font-size: 14px; font-weight:500; cursor:pointer;
  }
  button:hover{ opacity:0.9; }
  button:active{ transform: scale(0.99); }
  button:disabled{ opacity:0.5; cursor:not-allowed; }

  .wheel-area{ display:flex; flex-direction:column; align-items:center; gap:1rem; }
  .wheel-container{ position:relative; width:300px; height:300px; max-width:100%; }
  .wheel-pointer{
    position:absolute; top:-6px; left:50%; transform:translateX(-50%);
    width:0; height:0; border-left:14px solid transparent; border-right:14px solid transparent;
    border-top:24px solid var(--accent); z-index:2;
    filter:drop-shadow(0 2px 2px rgba(0,0,0,0.4));
  }
  #wheel{
    width:100%; height:100%; border-radius:50%; border:4px solid var(--border);
    transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
    transform: rotate(0deg); box-shadow:0 0 0 6px var(--card);
  }
  .wheel-result{ font-size:16px; font-weight:600; min-height:24px; color: var(--accent2); }
  .wheel-result.empty-msg{ color: var(--muted); font-weight:400; }

  .admin-row{ display:flex; gap:8px; align-items:center; margin-top: 0; }
  .admin-row input{
    flex:1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 10px 12px; font-size: 14px; font-family: inherit;
  }
  .admin-row input:focus{ outline:none; box-shadow:0 0 0 2px var(--accent); }
  .admin-row button{ margin-top:0; width:auto; padding: 10px 16px; }
  .admin-status{ font-size:13px; margin-top:8px; }
  .admin-status.ok{ color: var(--accent2); }
  .admin-status.err{ color: var(--danger); }
  .locked-note{ color: var(--muted); font-size:13px; margin-top:8px; text-align:center; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Spin the Wheel</h1>
  <p class="sub">Spins through all submitted IGNs and picks a winner.</p>

  <div class="nav">
    <a href="index.html">Entries</a>
    <a href="wheel.html" class="active">Spin the Wheel</a>
  </div>

  <div class="card" id="adminCard">
    <h2>Admin Access</h2>
    <p class="sub">Enter the admin password to unlock the spin button.</p>
    <div class="admin-row">
      <input type="password" id="adminPassword" placeholder="Admin password" />
      <button id="unlockBtn">Unlock</button>
    </div>
    <p class="admin-status" id="adminStatus"></p>
  </div>

  <div class="card">
    <h2>Wheel of Names</h2>
    <div class="wheel-area">
      <div class="wheel-container">
        <div class="wheel-pointer"></div>
        <svg id="wheel" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <button id="spinBtn" disabled>Spin the wheel</button>
      <p class="locked-note" id="lockedNote">🔒 Admin password required to spin.</p>
      <p class="wheel-result" id="wheelResult"></p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = "https://nhhcczckfggxzcwvcyhi.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_L750rvxniNvogY-TS2VB0w_APqM391a";

// ====== Set your admin password here ======
const ADMIN_PASSWORD = "admin123";
// ============================================

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const TABLE = "entries";

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

const wheelEl = document.getElementById('wheel');
const spinBtn = document.getElementById('spinBtn');
const wheelResult = document.getElementById('wheelResult');
const lockedNote = document.getElementById('lockedNote');
const adminPasswordInput = document.getElementById('adminPassword');
const unlockBtn = document.getElementById('unlockBtn');
const adminStatus = document.getElementById('adminStatus');
const adminCard = document.getElementById('adminCard');

let currentNames = [];
let currentRotation = 0;
let spinning = false;
let isAdmin = sessionStorage.getItem('wheelAdmin') === 'true';

const WHEEL_COLORS = ['#7f77dd', '#1d9e75', '#e2a14b', '#4ba3e2', '#e24b4a', '#9a77dd', '#4be29b', '#dd77b8', '#a3e24b', '#77b8dd'];

function polarToCartesian(cx, cy, r, angleDeg){
  const angleRad = (angleDeg - 90) * Math.PI / 180;
  return { x: cx + r * Math.cos(angleRad), y: cy + r * Math.sin(angleRad) };
}

function updateSpinAvailability(){
  if(isAdmin){
    lockedNote.style.display = 'none';
    spinBtn.disabled = currentNames.length === 0 || spinning;
  } else {
    lockedNote.style.display = 'block';
    spinBtn.disabled = true;
  }
}

function renderWheel(names){
  currentNames = names;
  const cx = 150, cy = 150, r = 145;
  wheelEl.innerHTML = '';

  if(names.length === 0){
    wheelEl.innerHTML = `
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="#11141a" stroke="#2a2e38" stroke-width="1"/>
      <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" fill="#9a9fab" font-size="14">No entries yet</text>
    `;
    updateSpinAvailability();
    wheelResult.textContent = 'Add some entries on the first page to spin the wheel.';
    wheelResult.classList.add('empty-msg');
    return;
  }

  wheelResult.classList.remove('empty-msg');

  if(names.length === 1){
    wheelEl.innerHTML = `
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="${WHEEL_COLORS[0]}" stroke="#2a2e38" stroke-width="1"/>
      <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="16" font-weight="600">${escapeHtml(names[0])}</text>
    `;
    updateSpinAvailability();
    return;
  }

  const sliceAngle = 360 / names.length;
  let svg = '';

  names.forEach((name, i) => {
    const startAngle = i * sliceAngle;
    const endAngle = startAngle + sliceAngle;
    const start = polarToCartesian(cx, cy, r, startAngle);
    const end = polarToCartesian(cx, cy, r, endAngle);
    const largeArc = sliceAngle > 180 ? 1 : 0;
    const color = WHEEL_COLORS[i % WHEEL_COLORS.length];

    const pathData = `M ${cx} ${cy} L ${start.x} ${start.y} A ${r} ${r} 0 ${largeArc} 1 ${end.x} ${end.y} Z`;
    svg += `<path d="${pathData}" fill="${color}" stroke="#171a21" stroke-width="1"/>`;

    const midAngle = startAngle + sliceAngle / 2;
    const labelPos = polarToCartesian(cx, cy, r * 0.65, midAngle);

    svg += `<text x="${labelPos.x}" y="${labelPos.y}" text-anchor="middle" dominant-baseline="middle"
              fill="#fff" font-size="11" font-weight="600"
              transform="rotate(${midAngle}, ${labelPos.x}, ${labelPos.y})">${escapeHtml(name)}</text>`;
  });

  wheelEl.innerHTML = svg;
  updateSpinAvailability();
}

async function loadNames(){
  const { data, error } = await sb
    .from(TABLE)
    .select('ign')
    .order('created_at', { ascending: false });

  if(error){
    console.error(error);
    renderWheel([]);
    return;
  }
  renderWheel((data || []).map(r => r.ign).filter(Boolean));
}

unlockBtn.addEventListener('click', () => {
  const val = adminPasswordInput.value;
  if(val === ADMIN_PASSWORD){
    isAdmin = true;
    sessionStorage.setItem('wheelAdmin', 'true');
    adminStatus.textContent = 'Unlocked. You can now spin the wheel.';
    adminStatus.className = 'admin-status ok';
    adminCard.style.display = 'none';
    updateSpinAvailability();
  } else {
    adminStatus.textContent = 'Incorrect password.';
    adminStatus.className = 'admin-status err';
  }
  adminPasswordInput.value = '';
});

adminPasswordInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter') unlockBtn.click();
});

spinBtn.addEventListener('click', () => {
  if(!isAdmin || spinning || currentNames.length === 0) return;

  spinning = true;
  spinBtn.disabled = true;
  wheelResult.textContent = '';

  const n = currentNames.length;
  const sliceAngle = 360 / n;

  const winnerIndex = Math.floor(Math.random() * n);
  const sliceMid = winnerIndex * sliceAngle + sliceAngle / 2;
  const randomOffset = (Math.random() - 0.5) * (sliceAngle * 0.6);
  const extraSpins = 5 + Math.floor(Math.random() * 3);

  const targetAngle = extraSpins * 360 + (360 - sliceMid - randomOffset);

  currentRotation += targetAngle;
  wheelEl.style.transform = `rotate(${currentRotation}deg)`;

  setTimeout(() => {
    spinning = false;
    wheelResult.textContent = `🎉 Winner: ${currentNames[winnerIndex]}`;
    updateSpinAvailability();
  }, 4100);
});

// If already unlocked this session, hide admin card
if(isAdmin){
  adminCard.style.display = 'none';
}

loadNames();

sb.channel('wheel-entries-changes')
  .on('postgres_changes', { event: '*', schema: 'public', table: TABLE }, () => {
    if(!spinning) loadNames();
  })
  .subscribe();
</script>
</body>
</html>
