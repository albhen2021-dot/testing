<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
<style>
  :root{
    --bg:#0f1115; --card:#171a21; --border:#2a2e38;
    --accent:#7f77dd; --accent2:#1d9e75; --text:#eceef1;
    --muted:#9a9fab; --danger:#e24b4a;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); min-height:100vh; padding: 2rem 1rem;
  }
  .wrap{ max-width: 1100px; margin: 0 auto; }
  h1{ font-size: 22px; font-weight:500; margin-bottom: 0.25rem; }
  h2{ font-size: 18px; font-weight:500; margin-bottom: 0.25rem; }
  .sub{ color: var(--muted); font-size: 14px; margin-bottom: 1.5rem; }
  .card{
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 1.25rem; margin-bottom: 1.5rem;
  }
  button{
    margin-top: 18px; width:100%; background: var(--accent); color: #fff; border:none;
    border-radius: 8px; padding: 11px; font-size: 14px; font-weight:500; cursor:pointer;
  }
  button:hover{ opacity:0.9; }
  button:active{ transform: scale(0.99); }
  button:disabled{ opacity:0.5; cursor:not-allowed; }
  button.danger{ background: var(--danger); }
  table{
    width:100%; border-collapse: collapse; background: var(--card);
    border: 1px solid var(--border); border-radius: 10px; overflow:hidden; font-size:14px;
  }
  th, td{ text-align:left; padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th{ color: var(--muted); font-weight:500; font-size:13px; background: #11141a; }
  tr:last-child td{ border-bottom:none; }
  td.tiktok{ color: var(--accent2); }
  td.num{ color: var(--muted); width: 1%; white-space: nowrap; }
  td.date{ color: var(--muted); font-size:13px; white-space: nowrap; }
  .table-wrap{ overflow-x:auto; }
  .empty{ color: var(--muted); font-size:14px; text-align:center; padding: 1rem 0; }
  .status{ font-size:13px; margin-top:8px; }
  .status.ok{ color: var(--accent2); }
  .status.err{ color: var(--danger); }

  .topbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom: 0.75rem; }
  .logout-btn{
    margin-top:0; width:auto; padding: 8px 16px; font-size:13px; background: var(--card);
    border: 1px solid var(--border); color: var(--text);
  }

  .pagination{ display:flex; justify-content:center; align-items:center; gap: 10px; margin-top: 1rem; }
  .pagination button{
    margin-top:0; width:auto; padding: 8px 14px; background: var(--card); border: 1px solid var(--border);
  }
  .pagination button:disabled{ opacity:0.4; }
  .pagination span{ font-size: 13px; color: var(--muted); }

  /* Layout: divider on the left for the wheel, entries on the right */
  .layout{
    display:flex; gap: 1.5rem; align-items:flex-start;
  }
  .wheel-panel{
    flex: 0 0 320px;
    border-right: 1px solid var(--border);
    padding-right: 1.5rem;
  }
  .entries-panel{ flex: 1; min-width:0; }

  @media (max-width: 800px){
    .layout{ flex-direction: column; }
    .wheel-panel{
      flex: 1 1 auto; width:100%; border-right:none; border-bottom: 1px solid var(--border);
      padding-right:0; padding-bottom: 1.5rem;
    }
  }

  .wheel-area{ display:flex; flex-direction:column; align-items:center; gap:1rem; }
  .wheel-container{ position:relative; width:280px; height:280px; max-width:100%; }
  .wheel-pointer{
    position:absolute; top:-6px; left:50%; transform:translateX(-50%);
    width:0; height:0; border-left:14px solid transparent; border-right:14px solid transparent;
    border-top:24px solid var(--accent); z-index:2;
    filter:drop-shadow(0 2px 2px rgba(0,0,0,0.4));
  }
  #wheel{
    width:100%; height:100%; border-radius:50%; border:4px solid var(--border);
    transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
    transform: rotate(0deg); box-shadow:0 0 0 6px var(--card);
  }
  .wheel-result{ font-size:16px; font-weight:600; min-height:24px; color: var(--accent2); text-align:center; }
  .wheel-result.empty-msg{ color: var(--muted); font-weight:400; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1>Admin Panel</h1>
      <p class="sub" style="margin-bottom:0;">All entries and the wheel of names.</p>
    </div>
    <button class="logout-btn" id="logoutBtn">Logout</button>
  </div>

  <div class="layout">
    <div class="wheel-panel">
      <div class="card">
        <h2>Wheel of Names</h2>
        <p class="sub">Spins through all submitted IGNs.</p>
        <div class="wheel-area">
          <div class="wheel-container">
            <div class="wheel-pointer"></div>
            <svg id="wheel" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg"></svg>
          </div>
          <button id="spinBtn">Spin the wheel</button>
          <p class="wheel-result" id="wheelResult"></p>
        </div>
      </div>
    </div>

    <div class="entries-panel">
      <div class="card">
        <h2>All Entries</h2>
        <button class="danger" id="clearBtn">Clear all entries</button>
        <p class="status" id="adminStatus"></p>
      </div>

      <div id="list"><p class="empty">Loading...</p></div>
      <div class="pagination" id="pagination" style="display:none;">
        <button id="prevBtn">&laquo; Prev</button>
        <span id="pageInfo"></span>
        <button id="nextBtn">Next &raquo;</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = "https://nhhcczckfggxzcwvcyhi.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_L750rvxniNvogY-TS2VB0w_APqM391a";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const TABLE = "entries";
const PAGE_SIZE = 10;

// ---- Simple session guard ----
if(sessionStorage.getItem('entriesAdmin') !== 'true'){
  window.location.href = 'index.html';
}

const list = document.getElementById('list');
const pagination = document.getElementById('pagination');
const pageInfo = document.getElementById('pageInfo');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const clearBtn = document.getElementById('clearBtn');
const adminStatus = document.getElementById('adminStatus');
const logoutBtn = document.getElementById('logoutBtn');

let allRows = [];
let currentPage = 1;

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function formatDate(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }) +
    ' ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
}

function renderEntries(){
  if(!allRows || allRows.length === 0){
    list.innerHTML = '<p class="empty">No entries yet.</p>';
    pagination.style.display = 'none';
    return;
  }

  const totalPages = Math.ceil(allRows.length / PAGE_SIZE);
  if(currentPage > totalPages) currentPage = totalPages;
  if(currentPage < 1) currentPage = 1;

  const startIdx = (currentPage - 1) * PAGE_SIZE;
  const pageRows = allRows.slice(startIdx, startIdx + PAGE_SIZE);

  let html = '';
  pageRows.forEach((row, i) => {
    const num = startIdx + i + 1;
    html += `
      <tr>
        <td class="num">${num}</td>
        <td>${escapeHtml(row.ign || '')}</td>
        <td class="tiktok">${escapeHtml(row.tiktok || '')}</td>
        <td class="date">${formatDate(row.created_at)}</td>
      </tr>`;
  });

  list.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Entry No.</th><th>IGN</th><th>TIKTOK</th><th>Date save</th></tr>
        </thead>
        <tbody>${html}</tbody>
      </table>
    </div>`;

  if(totalPages > 1){
    pagination.style.display = 'flex';
    pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
    prevBtn.disabled = currentPage <= 1;
    nextBtn.disabled = currentPage >= totalPages;
  } else {
    pagination.style.display = 'none';
  }
}

prevBtn.addEventListener('click', () => { currentPage--; renderEntries(); });
nextBtn.addEventListener('click', () => { currentPage++; renderEntries(); });

async function loadEntries(){
  const { data, error } = await sb
    .from(TABLE)
    .select('*')
    .order('created_at', { ascending: true });

  if(error){
    list.innerHTML = '<p class="empty">Could not load entries.</p>';
    console.error(error);
    renderWheel([]);
    return;
  }
  allRows = data || [];
  renderEntries();
  renderWheel(allRows.map(r => r.ign).filter(Boolean));
}

clearBtn.addEventListener('click', async () => {
  const confirmed = confirm('This will permanently delete ALL entries. Continue?');
  if(!confirmed) return;

  const { error } = await sb.from(TABLE).delete().not('id', 'is', null);

  if(error){
    adminStatus.textContent = 'Error clearing entries.';
    adminStatus.className = 'status err';
    console.error(error);
    return;
  }

  adminStatus.textContent = 'All entries cleared.';
  adminStatus.className = 'status ok';
  currentPage = 1;
  loadEntries();
});

logoutBtn.addEventListener('click', () => {
  sessionStorage.removeItem('entriesAdmin');
  window.location.href = 'index.html';
});

// ====================== Wheel of Names ======================
const wheelEl = document.getElementById('wheel');
const spinBtn = document.getElementById('spinBtn');
const wheelResult = document.getElementById('wheelResult');

let currentNames = [];
let currentRotation = 0;
let spinning = false;

const WHEEL_COLORS = ['#7f77dd', '#1d9e75', '#e2a14b', '#4ba3e2', '#e24b4a', '#9a77dd', '#4be29b', '#dd77b8', '#a3e24b', '#77b8dd'];

function polarToCartesian(cx, cy, r, angleDeg){
  const angleRad = (angleDeg - 90) * Math.PI / 180;
  return { x: cx + r * Math.cos(angleRad), y: cy + r * Math.sin(angleRad) };
}

function renderWheel(names){
  currentNames = names;
  const cx = 150, cy = 150, r = 145;
  wheelEl.innerHTML = '';

  if(names.length === 0){
    wheelEl.innerHTML = `
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="#11141a" stroke="#2a2e38" stroke-width="1"/>
      <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" fill="#9a9fab" font-size="14">No entries yet</text>
    `;
    spinBtn.disabled = true;
    wheelResult.textContent = 'Add some entries to spin the wheel.';
    wheelResult.classList.add('empty-msg');
    return;
  }

  spinBtn.disabled = spinning;
  wheelResult.classList.remove('empty-msg');

  if(names.length === 1){
    wheelEl.innerHTML = `
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="${WHEEL_COLORS[0]}" stroke="#2a2e38" stroke-width="1"/>
      <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="16" font-weight="600">${escapeHtml(names[0])}</text>
    `;
    return;
  }

  const sliceAngle = 360 / names.length;
  let svg = '';

  names.forEach((name, i) => {
    const startAngle = i * sliceAngle;
    const endAngle = startAngle + sliceAngle;
    const start = polarToCartesian(cx, cy, r, startAngle);
    const end = polarToCartesian(cx, cy, r, endAngle);
    const largeArc = sliceAngle > 180 ? 1 : 0;
    const color = WHEEL_COLORS[i % WHEEL_COLORS.length];

    const pathData = `M ${cx} ${cy} L ${start.x} ${start.y} A ${r} ${r} 0 ${largeArc} 1 ${end.x} ${end.y} Z`;
    svg += `<path d="${pathData}" fill="${color}" stroke="#171a21" stroke-width="1"/>`;

    const midAngle = startAngle + sliceAngle / 2;
    const labelPos = polarToCartesian(cx, cy, r * 0.65, midAngle);

    svg += `<text x="${labelPos.x}" y="${labelPos.y}" text-anchor="middle" dominant-baseline="middle"
              fill="#fff" font-size="11" font-weight="600"
              transform="rotate(${midAngle}, ${labelPos.x}, ${labelPos.y})">${escapeHtml(name)}</text>`;
  });

  wheelEl.innerHTML = svg;
}

spinBtn.addEventListener('click', () => {
  if(spinning || currentNames.length === 0) return;

  spinning = true;
  spinBtn.disabled = true;
  wheelResult.textContent = '';
  wheelResult.classList.remove('empty-msg');

  const n = currentNames.length;
  const sliceAngle = 360 / n;

  const winnerIndex = Math.floor(Math.random() * n);
  const sliceMid = winnerIndex * sliceAngle + sliceAngle / 2;
  const randomOffset = (Math.random() - 0.5) * (sliceAngle * 0.6);
  const extraSpins = 5 + Math.floor(Math.random() * 3);

  const targetAngle = extraSpins * 360 + (360 - sliceMid - randomOffset);

  currentRotation += targetAngle;
  wheelEl.style.transform = `rotate(${currentRotation}deg)`;

  setTimeout(() => {
    spinning = false;
    wheelResult.textContent = `🎉 Winner: ${currentNames[winnerIndex]}`;
    spinBtn.disabled = currentNames.length === 0;
  }, 4100);
});

loadEntries();

sb.channel('admin-entries-changes')
  .on('postgres_changes', { event: '*', schema: 'public', table: TABLE }, () => {
    if(!spinning) loadEntries();
  })
  .subscribe();
</script>
</body>
</html>
