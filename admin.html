<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
<style>
  :root{
    --bg:#0f1115; --card:#171a21; --border:#2a2e38;
    --accent:#7f77dd; --text:#eceef1; --muted:#9a9fab;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); min-height:100vh; padding: 2rem 1rem;
  }
  .wrap{ max-width: 480px; margin: 0 auto; }
  .card{
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 1.5rem;
  }
  h1{ font-size: 22px; font-weight:500; margin-bottom: 0.5rem; }
  p{ color: var(--muted); font-size:14px; margin-bottom: 1.25rem; }
  button{
    width:100%; background: var(--accent); color: #fff; border:none;
    border-radius: 8px; padding: 11px; font-size: 14px; font-weight:500; cursor:pointer;
  }
  button:hover{ opacity:0.9; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Admin Page</h1>
    <p>You are logged in.</p>
    <button id="logoutBtn">Logout</button>
  </div>
</div>

<script>
if(sessionStorage.getItem('isAdmin') !== 'true'){
  window.location.href = 'index.html';
}

document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('isAdmin');
  window.location.href = 'index.html';
});
</script>
</body>
</html>
